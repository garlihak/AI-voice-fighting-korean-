<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚔️ 점프 & 보이스 배틀</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Jua',sans-serif; background:#1a1a2e; overflow:hidden; width:100vw; height:100vh; display:flex; flex-direction:column; touch-action:manipulation; }
.screen { display:none; width:100%; height:100%; flex-direction:column; align-items:center; justify-content:center; }
.screen.active { display:flex; }
#screen-start { background:linear-gradient(160deg,#1a0d2b,#2b1a3a 50%,#0d0d1a); gap:24px; padding:32px 24px; }
.title-main { font-size:42px; color:#fff; text-shadow:0 4px 20px rgba(138,43,226,0.6); text-align:center; }
.title-sub { font-size:16px; color:rgba(255,255,255,0.6); text-align:center; margin-top:6px; }
.char-select { display:flex; gap:20px; justify-content:center; width:100%; }
.char-btn { background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.2); border-radius:20px; padding:16px 20px; cursor:pointer; text-align:center; transition:all 0.2s; flex:1; max-width:160px; }
.char-btn.selected { background:rgba(0,255,255,0.1); border-color:#00ffff; transform:scale(1.05); }
.char-btn img { width:100px; height:100px; object-fit:contain; }
.char-name { font-size:18px; color:#fff; margin-top:8px; }
.start-btn { background:linear-gradient(135deg,#6a11cb,#2575fc); border:none; border-radius:50px; padding:18px 56px; font-family:'Jua',sans-serif; font-size:26px; color:#fff; cursor:pointer; box-shadow:0 6px 30px rgba(106,17,203,0.5); }

#screen-game { background:#2c3e50; padding:0; justify-content:flex-start; }
.boss-hud { width:90%; margin-top:15px; position:relative; }
.boss-name { color:#ff4444; font-size:18px; margin-bottom:5px; text-align:center; text-shadow: 0 0 10px #000; }
.boss-hp-bg { width:100%; height:25px; background:rgba(0,0,0,0.5); border:2px solid #fff; border-radius:15px; overflow:hidden; }
.boss-hp-fill { height:100%; background:linear-gradient(90deg, #ff0000, #ff7b7b); width:100%; transition: width 0.3s ease-out; }

.player-hud { width:100%; padding:10px 16px; display:flex; justify-content:space-between; align-items:center; z-index:10; }
.hp-display { display:flex; gap:2px; flex-wrap:wrap; max-width: 60%; }
.hp-heart { font-size:22px; transition:all 0.3s; }
.hp-heart.empty { filter:grayscale(1) opacity(0.3); }

#game-canvas { width:100%; flex:1; display:block; }

/* 하단 조작부 레이아웃 변경 */
.bottom-area { width:100%; padding:15px; background:rgba(0,0,0,0.6); backdrop-filter:blur(10px); display:flex; flex-direction:column; align-items:center; gap:10px; border-top:2px solid rgba(255,255,255,0.1); }
.vocab-word { font-size:42px; color:#fff; text-shadow:0 0 15px rgba(255,255,255,0.5); min-height:50px; }
.vocab-feedback { font-size:16px; min-height:20px; font-weight:bold; }

.controls { display:flex; width:100%; justify-content:space-around; align-items:center; max-width: 400px; margin-top: 5px; }

.mic-btn, .jump-btn { height:75px; border-radius:20px; border:3px solid #fff; font-family:'Jua',sans-serif; font-size:24px; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 0 15px rgba(0,0,0,0.5); transition:transform 0.1s; }
.mic-btn:active, .jump-btn:active { transform:scale(0.95); }

.mic-btn { width:45%; background:linear-gradient(135deg,#2575fc,#6a11cb); }
.mic-btn.listening { background:linear-gradient(135deg,#ff0080,#ff8c00); animation: pulse 1.2s infinite; }
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

.jump-btn { width:45%; background:linear-gradient(135deg,#00b09b,#96c93d); }

@keyframes bossHit { 0% { transform: translateX(0); filter: brightness(1); } 25% { transform: translateX(10px); filter: brightness(5); } 50% { transform: translateX(-10px); } 75% { transform: translateX(5px); } 100% { transform: translateX(0); filter: brightness(1); } }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
.boss-hit { animation: bossHit 0.4s ease-in-out; }
.shake { animation: shake 0.4s ease; }

.checkpoint-popup { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
.checkpoint-popup.show { display:flex; }
.checkpoint-box { background:#1a1a2e; border:4px solid #00ffff; border-radius:30px; padding:40px; text-align:center; color:#fff; }
</style>
</head>
<body>

<div id="screen-start" class="screen active">
  <div class="title-main">⚔️ 점프 & 보이스 배틀</div>
  <div class="title-sub">공격을 피하며 단어를 읽어 호랑이를 물리치세요!</div>
  <div class="char-select">
    <div class="char-btn selected" data-char="rabbit" onclick="selectChar(this)">
      <img id="prev-rabbit" alt="토끼">
      <div class="char-name">번개 토끼</div>
    </div>
    <div class="char-btn" data-char="deer" onclick="selectChar(this)">
      <img id="prev-deer" alt="사슴">
      <div class="char-name">바람 사슴</div>
    </div>
  </div>
  <button class="start-btn" onclick="startGame()">배틀 시작! ⚔️</button>
</div>

<div id="screen-game" class="screen">
  <div class="boss-hud">
    <div class="boss-name" id="boss-name">거대 호랑이</div>
    <div class="boss-hp-bg"><div class="boss-hp-fill" id="boss-hp-fill"></div></div>
  </div>
  <div class="player-hud">
    <div class="hp-display" id="hp-display"></div>
    <div style="color:#fff; font-size:18px;" id="stage-info">Stage 1/4</div>
  </div>
  <canvas id="game-canvas"></canvas>
  
  <div class="bottom-area">
    <div class="vocab-word" id="vocab-word">-</div>
    <div class="vocab-feedback" id="vocab-feedback">마이크를 누르고 읽어보세요!</div>
    
    <div class="controls">
      <button class="mic-btn" id="mic-btn" onclick="startListening()">🎤 공격!</button>
      <button class="jump-btn" id="jump-btn" onclick="jump()">⬆️ 점프!</button>
    </div>
  </div>
</div>

<div class="checkpoint-popup" id="checkpoint-popup">
  <div class="checkpoint-box">
    <h2 id="cp-title" style="font-size:32px; margin-bottom:10px;">STAGE CLEAR!</h2>
    <p id="cp-msg" style="margin-bottom:20px;">악당을 물리쳤습니다!</p>
    <button class="start-btn" onclick="nextStage()">다음 스테이지로 →</button>
  </div>
</div>

<script>
const GITHUB_URL = "https://raw.githubusercontent.com/garlihak/garlihak/main/";
const SRC = { rabbit: GITHUB_URL + "rabbit.png", deer: GITHUB_URL + "deer.png", tiger: GITHUB_URL + "tiger.png" };
const IMG = {};
Object.entries(SRC).forEach(([k, v]) => { const i = new Image(); i.src = v; IMG[k] = i; });

document.getElementById('prev-rabbit').src = SRC.rabbit;
document.getElementById('prev-deer').src = SRC.deer;

const STAGES = [
  { name:'어둠의 숲', bossName:'심술궂은 호랑이', vocab:['싫다','많다','달다','볶다','먹다','걸다','닿다'] },
  { name:'침묵의 강', bossName:'독설의 호랑이', vocab:['넓다','맑다','걷다','앉다','잊다','좋다','잊다'] },
  { name:'안개 산맥', bossName:'무뚝뚝한 호랑이', vocab:['씻다','옳다','끊다','씻다','맞다','빗다','끓다'] },
  { name:'마지막 성', bossName:'단어 파괴자 호랑이', vocab:['찾다','벗다','입다','찾다','엮다','꺾다'] },
];

let state = { 
  selectedChar:'rabbit', stageIdx:0, vocabIdx:0, hp:5, maxHp:5, // HP 5개로 수정
  bossHP:0, bossMaxHP:0,
  
  // 점프 관련 물리 변수
  jumpY: 0, jumpVY: 0, isJumping: false,
  
  // 보스 공격 변수
  bossAttacks: [], lastAttackTime: 0, attackInterval: 2500,
  
  isAttacking: false, bossHitEffect: 0,
  particles:[], listening:false, recognition:null, animFrame:null
};

const $ = id => document.getElementById(id);

function selectChar(btn) { 
  document.querySelectorAll('.char-btn').forEach(b=>b.classList.remove('selected')); 
  btn.classList.add('selected'); 
  state.selectedChar=btn.dataset.char; 
}

function startGame() {
  state.stageIdx = 0;
  state.hp = 5;
  loadStage();
  showScreen('screen-game');
  renderLoop();
}

function loadStage() {
  const s = STAGES[state.stageIdx];
  state.vocabIdx = 0;
  state.bossMaxHP = s.vocab.length;
  state.bossHP = s.vocab.length;
  state.bossAttacks = []; // 스테이지 시작시 공격 초기화
  state.lastAttackTime = Date.now() + 2000; // 2초 뒤 첫 공격
  $('boss-name').textContent = s.bossName;
  $('stage-info').textContent = `Stage ${state.stageIdx+1}/${STAGES.length}`;
  updateUI();
  loadNextWord();
}

function updateUI() {
  const hpPercent = (state.bossHP / state.bossMaxHP) * 100;
  $('boss-hp-fill').style.width = hpPercent + '%';
  
  const hpDiv = $('hp-display'); hpDiv.innerHTML = '';
  for(let i=0; i<state.maxHp; i++) {
    const s = document.createElement('span');
    s.className = 'hp-heart' + (i >= state.hp ? ' empty' : '');
    s.textContent = '❤️';
    hpDiv.appendChild(s);
  }
}

function jump() {
  // 바닥에 있을 때만 점프 가능
  if (state.jumpY === 0) {
    state.jumpVY = 18; // 점프력 (높게 설정)
    state.isJumping = true;
  }
}

const canvas = $('game-canvas'), ctx = canvas.getContext('2d');
function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight - 340; }
window.addEventListener('resize', initCanvas);
initCanvas();

function renderLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const W = canvas.width, H = canvas.height;
  const groundY = H * 0.8;

  // 1. 플레이어 물리(점프) 계산
  if (state.isJumping || state.jumpY > 0) {
    state.jumpY += state.jumpVY;
    state.jumpVY -= 1.0; // 중력
    
    // 바닥에 착지
    if (state.jumpY <= 0) {
      state.jumpY = 0;
      state.jumpVY = 0;
      state.isJumping = false;
    }
  }

  // 2. 보스 공격 생성 로직 (게임오버나 클리어가 아닐 때만)
  if (state.hp > 0 && state.bossHP > 0 && Date.now() - state.lastAttackTime > state.attackInterval) {
    state.bossAttacks.push({
      x: W * 0.8, // 호랑이 위치에서 출발
      y: groundY - 40, // 바닥에서 살짝 뜬 위치
      vx: -(W * 0.015), // 화면 크기에 비례한 속도
      size: 40
    });
    // 다음 공격 쿨타임 (랜덤성 부여: 1.5초 ~ 3초)
    state.attackInterval = 1500 + Math.random() * 1500;
    state.lastAttackTime = Date.now();
  }

  // 3. 보스 투사체 이동 및 충돌 판정
  for (let i = state.bossAttacks.length - 1; i >= 0; i--) {
    let atk = state.bossAttacks[i];
    atk.x += atk.vx;
    
    // 화면 밖으로 나가면 삭제
    if (atk.x < -50) {
      state.bossAttacks.splice(i, 1);
      continue;
    }

    // 그리기
    ctx.font = '40px serif';
    ctx.fillText('🔥', atk.x, atk.y);

    // 충돌 판정 (플레이어 위치: X = W*0.2)
    let playerX = W * 0.2;
    // 투사체가 플레이어의 X축 범위 안에 있고
    if (atk.x > playerX - 40 && atk.x < playerX + 40) {
      // 플레이어가 점프를 안 했거나, 충분히 높이 뛰지 못했다면 피격 (투사체 Y: groundY-40)
      let playerBottomY = groundY - state.jumpY; // 플레이어 발끝
      if (playerBottomY > atk.y - 20) { 
        // 충돌!
        state.hp--;
        updateUI();
        state.bossAttacks.splice(i, 1); // 투사체 소멸
        $('screen-game').classList.add('shake');
        setTimeout(() => $('screen-game').classList.remove('shake'), 400);
        $('vocab-feedback').textContent = '🔥 공격에 맞았습니다!';
        $('vocab-feedback').style.color = '#ff4444';
        
        if (state.hp <= 0) {
          if(state.recognition) { try{state.recognition.stop();}catch(e){} }
          setTimeout(() => {
            alert("호랑이의 공격에 쓰러졌습니다... 다시 도전하세요!");
            location.reload();
          }, 500);
        }
      }
    }
  }

  // 4. 캐릭터 그리기
  // 주인공 (jumpY 적용)
  drawChar(IMG[state.selectedChar], W * 0.2, groundY - state.jumpY, 120, false, Date.now());

  // 호랑이
  ctx.save();
  if (state.bossHitEffect > 0) {
    ctx.translate((Math.random()-0.5)*15, (Math.random()-0.5)*15); 
    state.bossHitEffect--;
  }
  drawChar(IMG.tiger, W * 0.8, groundY, 160, true, Date.now());
  ctx.restore();

  // 5. 내 공격 투사체(별) 처리
  state.particles = state.particles.filter(p => p.life > 0);
  state.particles.forEach(p => {
    ctx.font = p.size + 'px serif';
    ctx.fillText(p.emoji, p.x, p.y);
    p.x += p.vx; p.y += p.vy; p.life--;
  });

  state.animFrame = requestAnimationFrame(renderLoop);
}

function drawChar(img, cx, gy, size, flip, t) {
  if(!img.complete) return;
  const bounce = Math.abs(Math.sin(t * 0.005)) * 10;
  ctx.save();
  if(flip) { ctx.translate(cx + size/2, 0); ctx.scale(-1, 1); ctx.drawImage(img, 0, gy - size - bounce, size, size); }
  else { ctx.drawImage(img, cx - size/2, gy - size - bounce, size, size); }
  ctx.restore();
}

function loadNextWord() {
  const s = STAGES[state.stageIdx];
  if (state.bossHP <= 0) { showCheckpoint(); return; }
  $('vocab-word').textContent = s.vocab[state.vocabIdx];
  $('vocab-feedback').textContent = '공격을 피하며 읽어보세요!';
  $('vocab-feedback').style.color = '#fff';
  const btn = $('mic-btn'); btn.innerHTML = '🎤 공격!'; btn.classList.remove('listening');
}

function startListening() {
  if(state.listening) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ alert('음성인식이 지원되지 않는 브라우저입니다.'); return; }
  
  const rec = new SR(); rec.lang = 'ko-KR';
  state.listening = true; 
  $('mic-btn').classList.add('listening');
  $('mic-btn').innerHTML = '👂 듣는중..';
  
  rec.onresult = e => {
    const heard = e.results[0][0].transcript.replace(/\s/g,'');
    const target = STAGES[state.stageIdx].vocab[state.vocabIdx].replace(/\s/g,'');
    handleBattle(heard.includes(target) || target.includes(heard), heard);
  };
  rec.onerror = () => { state.listening = false; handleBattle(false, '인식 실패'); };
  rec.start();
}

function handleBattle(correct, heard) {
  state.listening = false;
  if(correct) {
    state.bossHP--;
    state.vocabIdx++;
    state.bossHitEffect = 20; 
    spawnAttackParticles();
    $('vocab-feedback').textContent = '⚡ 통쾌한 공격!';
    $('vocab-feedback').style.color = '#00ffff';
    updateUI();
    setTimeout(loadNextWord, 800);
  } else {
    // 음성 오답 시에는 HP가 깎이지 않고 다시 시도하게만 함 (호랑이 공격에만 맞도록 분리)
    $('vocab-feedback').textContent = `❌ 다시! (들린 말: ${heard})`;
    $('vocab-feedback').style.color = '#ffaa00';
    setTimeout(() => { 
        $('mic-btn').innerHTML = '🎤 공격!';
        $('mic-btn').classList.remove('listening');
    }, 800);
  }
}

function spawnAttackParticles() {
  for(let i=0; i<8; i++) {
    state.particles.push({
      x: canvas.width * 0.2, y: canvas.height * 0.6,
      vx: 15 + Math.random()*5, vy: (Math.random()-0.5)*10,
      emoji: '⭐', size: 20 + Math.random()*20, life: 40
    });
  }
}

function showCheckpoint() {
  state.bossAttacks = []; // 클리어 시 날아오던 공격 삭제
  $('checkpoint-popup').classList.add('show');
}

function nextStage() {
  $('checkpoint-popup').classList.remove('show');
  state.stageIdx++;
  if(state.stageIdx >= STAGES.length) {
    alert("축하합니다! 모든 호랑이를 물리치고 영웅이 되었습니다!");
    location.reload();
  } else {
    state.hp = 5;
    loadStage();
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}
</script>
</body>
</html>
